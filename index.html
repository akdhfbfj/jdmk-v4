<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전담 마크 Pro V8.11 - 지능형 시수 관리 시스템</title>
    
    <!-- 1. 스타일 및 라이브러리 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    
    <!-- 2. Firebase 설정 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore as getFS, doc as getD, setDoc as setD, getDoc as getDocD, collection as collD, onSnapshot as onS, deleteDoc as delD, Timestamp as TS, query as qD, orderBy as obD, limit as limD } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBWxSDDYkOtaZI9dByQ85A0izlrCmHEoIQ",
          authDomain: "jdmk-v2.firebaseapp.com",
          projectId: "jdmk-v2",
          storageBucket: "jdmk-v2.firebasestorage.app",
          messagingSenderId: "279087439497",
          appId: "1:279087439497:web:e7f19f6a911483248cb058",
          measurementId: "G-PH80PJW6TC"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFS(app);
            const appId = 'jdmk-v5-final'; 

            window.fb = { auth, db, appId, doc: getD, setDoc: setD, getDoc: getDocD, collection: collD, onSnapshot: onS, deleteDoc: delD, Timestamp: TS, signInAnonymously, onAuthStateChanged, query: qD, orderBy: obD, limit: limD };
            window.fbReady = true; 
        } catch (e) {
            window.fbError = e.message;
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { width: 30px; height: 30px; border: 3px solid #e2e8f0; border-top: 3px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        
        .animate-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-in { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .btn-press:active { transform: scale(0.96); }
        .period-badge { display: inline-flex; align-items: center; justify-content: center; width: 1.25rem; height: 1.25rem; background: #334155; color: white; border-radius: 50%; font-size: 0.7rem; font-weight: 900; }
        .conflict-glow { box-shadow: 0 0 15px rgba(225, 29, 72, 0.2); border-color: #fb7185 !important; }
        
        .excel-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .excel-table th { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 8px; font-weight: 900; color: #475569; text-align: center; }
        .excel-table td { border: 1px solid #e2e8f0; padding: 8px; color: #1e293b; background: white; text-align: center; }
        .excel-table tr:nth-child(even) td { background: #f8fafc; }

        .sidebar-shadow { box-shadow: -15px 0 35px rgba(0,0,0,0.08); }
        .transition-main { transition: padding-right 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #e2e8f0; border: 1px solid #e2e8f0; border-radius: 1.5rem; overflow: hidden; }
        .calendar-day { background: white; min-height: 120px; padding: 10px; transition: background 0.2s; }
        .calendar-day.outside { background: #f1f5f9; color: #cbd5e1; }
        .calendar-day.today { background: #eff6ff; }
        .calendar-day.conflict-row { background: #fff1f2; }
        .calendar-header-day { background: #f8fafc; padding: 10px; text-align: center; font-size: 10px; font-weight: 900; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        
        .holiday-text { color: #e11d48 !important; }
        .holiday-bg { background-color: #fff1f2 !important; }
        .event-text { color: #4f46e5 !important; }
        .event-bg { background-color: #f5f3ff !important; }
        .vacation-bg { background-color: #f1f5f9 !important; color: #94a3b8 !important; }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white;">
            <div class="spinner"></div>
            <p style="margin-top: 15px; font-weight: 700; color: #4f46e5; font-size: 0.8rem;">전담 마크 Pro V8.11 로딩 중...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createElement } = React;

        // --- 헬퍼 함수 ---
        const getMonday = (dateStr) => {
            const date = new Date(dateStr + 'T00:00:00');
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1); 
            const monday = new Date(date.setDate(diff));
            return monday.toLocaleDateString('en-CA');
        };

        const SafeIcon = ({ name, size = 16, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => {
                const check = setInterval(() => { if (window.lucide) { setReady(true); clearInterval(check); } }, 50);
                return () => clearInterval(check);
            }, []);
            if (!ready || !window.lucide?.icons[name]) return <div style={{width: size, height: size}} className={className} />;
            const iconData = window.lucide.icons[name];
            return createElement('svg', { ...iconData[1], width: size, height: size, className: className, key: name },
                iconData[2].map((child, i) => createElement(child[0], { ...child[1], key: i }))
            );
        };

        const DAYS = ['월', '화', '수', '목', '금'];
        const PERIODS = [1, 2, 3, 4, 5, 6];
        const CIRCLE_NUMS = ["", "①", "②", "③", "④", "⑤", "⑥", "⑦"];

        const SPECIALISTS = [
            { id: 'english', name: '영어', color: 'bg-indigo-600', text: 'text-indigo-700', bg: 'bg-indigo-50', border: 'border-indigo-200' },
            { id: 'science', name: '과학', color: 'bg-emerald-600', text: 'text-emerald-700', bg: 'bg-emerald-50', border: 'border-emerald-200' },
            { id: 'pe', name: '체육', color: 'bg-rose-600', text: 'text-rose-700', bg: 'bg-rose-50', border: 'border-rose-200' },
            { id: 'external', name: '외부강사', color: 'bg-amber-600', text: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' }
        ];

        const HOLIDAYS_2026 = {
            '2026-01-01': '신정', '2026-02-16': '설날 연휴', '2026-02-17': '설날', '2026-02-18': '설날 연휴',
            '2026-03-01': '삼일절', '2026-03-02': '대체공휴일', '2026-05-05': '어린이날', '2026-05-24': '부처님오신날',
            '2026-05-25': '대체공휴일', '2026-06-06': '현충일', '2026-08-15': '광복절', '2026-09-24': '추석 연휴',
            '2026-09-25': '추석', '2026-09-26': '추석 연휴', '2026-10-03': '개천절', '2026-10-09': '한글날', '2026-12-25': '성탄절'
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [baseSchedule, setBaseSchedule] = useState({});
            const [overrides, setOverrides] = useState({});
            
            const [targetHours, setTargetHours] = useState({ 
                s1: { english: 15, science: 15, pe: 15 }, 
                s2: { english: 15, science: 15, pe: 15 } 
            });
            const [semesterConfig, setSemesterConfig] = useState({ 
                s1Start: '2026-03-02', s1End: '2026-07-17', 
                s2Start: '2026-08-24', s2End: '2026-12-30' 
            });
            const [academicEvents, setAcademicEvents] = useState({});

            const [activeTab, setActiveTab] = useState('academic'); 
            const [viewMode, setViewMode] = useState('daily'); 
            const [selectedDate, setSelectedDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [selectedCell, setSelectedCell] = useState(null);
            const [isSaving, setIsSaving] = useState(false);

            const [statSearch, setStatSearch] = useState("");
            const [instSearch, setInstSearch] = useState("");

            const [moveDate, setMoveDate] = useState("");
            const [movePeriod, setMovePeriod] = useState(1);
            const [activeMoveItem, setActiveMoveItem] = useState(null); 
            const [newRegMode, setNewRegMode] = useState('master'); 
            const [newRegType, setNewRegType] = useState('english');
            const [newRegTitle, setNewRegTitle] = useState('');

            const [instTitle, setInstTitle] = useState("");
            const [instDates, setInstDates] = useState("");
            const [instClass, setInstClass] = useState("5-1");
            const [instStart, setInstStart] = useState(1);
            const [instEnd, setInstEnd] = useState(1);

            const [fixedSpec, setFixedSpec] = useState("english");
            const [fixedClass, setFixedClass] = useState("5-1");
            const [fixedSlots, setFixedSlots] = useState([]); 

            const dynamicClasses = useMemo(() => {
                const classSet = new Set(['5-1', '5-2', '5-3', '5-4']); 
                Object.values(baseSchedule).forEach(v => { if(v.classLabel) classSet.add(v.classLabel); });
                Object.values(overrides).forEach(v => { if(v.classLabel) classSet.add(v.classLabel); });
                return Array.from(classSet).sort();
            }, [baseSchedule, overrides]);

            const currentGradeClasses = useMemo(() => {
                return dynamicClasses.filter(c => c.includes('-'));
            }, [dynamicClasses]);

            useEffect(() => {
                const checkInterval = setInterval(() => {
                    if (window.fbReady && window.fb) {
                        const { auth, signInAnonymously, onAuthStateChanged } = window.fb;
                        signInAnonymously(auth).catch(e => console.error(e));
                        onAuthStateChanged(auth, setUser);
                        clearInterval(checkInterval);
                    }
                }, 100);
                setTimeout(() => setIsLoading(false), 1500); 
                return () => clearInterval(checkInterval);
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, appId, collection, onSnapshot } = window.fb;
                const path = (c) => collection(db, 'artifacts', appId, 'public', 'data', c);
                const unsubs = [
                    onSnapshot(path('base'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setBaseSchedule(d);
                    }),
                    onSnapshot(path('overrides'), (s) => {
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data());
                        setOverrides(d);
                        setIsLoading(false);
                    }),
                    onSnapshot(path('academic'), (s) => {
                        const d = {};
                        s.docs.forEach(doc => { 
                            if (doc.id === 'targets') setTargetHours(doc.data()); 
                            else if (doc.id === 'semesters') setSemesterConfig(doc.data());
                            else d[doc.id] = doc.data();
                        });
                        setAcademicEvents(d);
                    })
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            const saveData = async (coll, id, data) => {
                const { db, appId, doc, setDoc, Timestamp } = window.fb;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', coll, id), { ...data, updatedAt: Timestamp.now() });
            };

            const deleteData = async (coll, id) => {
                const { db, appId, doc, deleteDoc } = window.fb;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', coll, id));
            };

            const isVacationDay = (dateStr) => {
                const { s1Start, s1End, s2Start, s2End } = semesterConfig;
                return (dateStr < s1Start) || (dateStr > s1End && dateStr < s2Start) || (dateStr > s2End);
            };

            const getCellData = (dateStr, period, classLabel) => {
                const overrideKey = `${dateStr}-${period}-${classLabel}`;
                const date = new Date(dateStr + 'T00:00:00'); 
                const dayIdx = (date.getDay() + 6) % 7; 

                if (HOLIDAYS_2026[dateStr]) return { type: 'holiday', title: HOLIDAYS_2026[dateStr], isHoliday: true };
                
                const academic = academicEvents[dateStr];
                if (academic) {
                    if (academic.isHoliday) return { type: 'holiday', title: academic.title, isHoliday: true };
                    if (academic.isEvent) return { type: 'event', title: academic.title, isEvent: true };
                }

                if (isVacationDay(dateStr)) return { type: 'vacation', title: '방학 기간', isVacation: true };

                const override = overrides[overrideKey];
                const baseMatchEntry = Object.entries(baseSchedule).find(([k,v]) => 
                    v.dayIdx === dayIdx && v.period === period && v.classLabel === classLabel
                );
                const baseMatch = baseMatchEntry ? { id: baseMatchEntry[0], ...baseMatchEntry[1] } : null;

                const hasInstructor = override && override.type && override.type !== 'none';
                const hideBase = override && override.hideBase;

                return {
                    override: hasInstructor ? override : null,
                    base: (baseMatch && !hideBase) ? baseMatch : null,
                    isConflict: !!(hasInstructor && baseMatch && !hideBase)
                };
            };

            const stats = useMemo(() => {
                const res = {};
                currentGradeClasses.forEach(c => {
                    res[c] = { 
                        s1: { english: 0, science: 0, pe: 0, external: 0, history: [] },
                        s2: { english: 0, science: 0, pe: 0, external: 0, history: [] }
                    };
                });
                const countOccurrences = (start, end, semester) => {
                    if(!start || !end) return;
                    let curr = new Date(start + 'T00:00:00');
                    const stop = new Date(end + 'T00:00:00');
                    while (curr <= stop) {
                        const dStr = curr.toLocaleDateString('en-CA');
                        const academic = academicEvents[dStr];
                        const isNoClassDay = HOLIDAYS_2026[dStr] || academic?.isHoliday || academic?.isEvent;
                        
                        if (!isNoClassDay) {
                            const dayIdx = (curr.getDay() + 6) % 7;
                            if (dayIdx < 5) {
                                currentGradeClasses.forEach(cls => {
                                    PERIODS.forEach(p => {
                                        const data = getCellData(dStr, p, cls);
                                        if (data.override) {
                                            res[cls][semester][data.override.type]++;
                                            if (data.override.type === 'external') {
                                                res[cls][semester].history.push({ date: dStr.replace(/-/g, '.'), period: p, title: data.override.title });
                                            }
                                        }
                                        if (data.base) res[cls][semester][data.base.type]++;
                                    });
                                });
                            }
                        }
                        curr.setDate(curr.getDate() + 1);
                    }
                };
                countOccurrences(semesterConfig.s1Start, semesterConfig.s1End, 's1');
                countOccurrences(semesterConfig.s2Start, semesterConfig.s2End, 's2');
                return res;
            }, [overrides, baseSchedule, academicEvents, currentGradeClasses, semesterConfig]);

            const formatHeaderDate = (dateStr) => {
                const date = new Date(dateStr + 'T00:00:00');
                const week = ['일', '월', '화', '수', '목', '금', '토'][date.getDay()];
                return `${date.getFullYear()}년 ${String(date.getMonth() + 1).padStart(2,'0')}월 ${String(date.getDate()).padStart(2,'0')}일 (${week}요일)`;
            };

            const adjustDate = (dateStr, direction) => {
                let d = new Date(dateStr + 'T00:00:00');
                do { d.setDate(d.getDate() + direction); } while (d.getDay() === 0 || d.getDay() === 6);
                setSelectedDate(d.toLocaleDateString('en-CA'));
            };

            if (isLoading) return null;

            return (
                <div className="min-h-screen flex flex-col animate-in relative overflow-x-hidden transition-main" style={{ paddingRight: isSidebarOpen ? '420px' : '0' }}>
                    <header className="bg-white border-b px-4 py-2 flex flex-col lg:flex-row justify-between items-center gap-2 sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-slate-900 p-2 rounded-xl text-white shadow-md"><SafeIcon name="ClipboardCheck" size={18} /></div>
                            <h1 className="text-sm font-black text-slate-800 tracking-tighter">전담 마크 <span className="text-indigo-600 italic">V8.11 Pro</span></h1>
                        </div>
                        <nav className="flex bg-slate-100 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                            {[
                                { id: 'academic', label: '수업 현황/달력', icon: 'Calendar' },
                                { id: 'instructor', label: '강사 수업 관리', icon: 'Layers' },
                                { id: 'config', label: '설정/마스터 시간표', icon: 'Settings' },
                                { id: 'stats', label: '시수 통계', icon: 'BarChart3' },
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-[11px] font-bold transition-all whitespace-nowrap ${activeTab === tab.id ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>
                                    <SafeIcon name={tab.icon} size={14} /> {tab.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="p-2 lg:p-4 max-w-[1600px] mx-auto w-full flex-1">
                        {activeTab === 'academic' && (
                            <div className="space-y-4">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-3 bg-white p-4 rounded-[2.5rem] shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-1">
                                        <button onClick={() => { 
                                            if(viewMode === 'monthly') {
                                                const d = new Date(selectedDate + 'T00:00:00'); d.setMonth(d.getMonth() - 1); setSelectedDate(d.toLocaleDateString('en-CA'));
                                            } else if(viewMode === 'weekly') adjustDate(selectedDate, -7);
                                            else adjustDate(selectedDate, -1);
                                        }} className="p-3 border rounded-2xl hover:bg-slate-50 transition-all btn-press"><SafeIcon name="ChevronLeft" size={20} /></button>
                                        <div className="relative group cursor-pointer flex items-center px-4 py-2 bg-slate-50 rounded-2xl border border-transparent hover:border-indigo-200 transition-all">
                                            <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="w-full h-full opacity-0 absolute inset-0 cursor-pointer z-20" />
                                            <span className="text-sm font-black text-slate-700 z-10">{selectedDate}</span>
                                            <SafeIcon name="Calendar" size={14} className="ml-2 text-indigo-400 z-10" />
                                        </div>
                                        <button onClick={() => { 
                                            if(viewMode === 'monthly') {
                                                const d = new Date(selectedDate + 'T00:00:00'); d.setMonth(d.getMonth() + 1); setSelectedDate(d.toLocaleDateString('en-CA'));
                                            } else if(viewMode === 'weekly') adjustDate(selectedDate, 7);
                                            else adjustDate(selectedDate, 1);
                                        }} className="p-3 border rounded-2xl hover:bg-slate-50 transition-all btn-press"><SafeIcon name="ChevronRight" size={20} /></button>
                                    </div>
                                    <div className="text-center">
                                        <div className={`text-xl font-black italic drop-shadow-sm ${HOLIDAYS_2026[selectedDate] || academicEvents[selectedDate]?.isHoliday ? 'holiday-text' : academicEvents[selectedDate]?.isEvent ? 'event-text' : isVacationDay(selectedDate) ? 'text-slate-300' : 'text-slate-800'}`}>
                                            {formatHeaderDate(selectedDate)}
                                            {(HOLIDAYS_2026[selectedDate] || academicEvents[selectedDate]?.isHoliday || academicEvents[selectedDate]?.isEvent || isVacationDay(selectedDate)) && 
                                                <span className="ml-2 text-sm">[{HOLIDAYS_2026[selectedDate] || academicEvents[selectedDate]?.title || (isVacationDay(selectedDate) ? '방학 기간' : '')}]</span>}
                                        </div>
                                    </div>
                                    <div className="flex bg-slate-100 p-1 rounded-2xl">
                                        {['daily', 'weekly', 'monthly'].map(mode => (
                                            <button key={mode} onClick={() => setViewMode(mode)} className={`px-5 py-2 rounded-xl text-[11px] font-black transition-all ${viewMode === mode ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>{mode === 'daily' ? '일별' : mode === 'weekly' ? '주별' : '월별'}</button>
                                        ))}
                                    </div>
                                </div>

                                {viewMode === 'weekly' && (
                                    <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-x-auto animate-in no-scrollbar">
                                        <table className="w-full border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b">
                                                    <th className="p-4 border-r w-16 text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">교시</th>
                                                    {(() => {
                                                        const mondayStr = getMonday(selectedDate);
                                                        return DAYS.map((d, i) => {
                                                            const colDate = new Date(mondayStr + 'T00:00:00'); colDate.setDate(colDate.getDate() + i);
                                                            const dateStr = colDate.toLocaleDateString('en-CA');
                                                            const isHol = HOLIDAYS_2026[dateStr] || academicEvents[dateStr]?.isHoliday;
                                                            const isEv = academicEvents[dateStr]?.isEvent;
                                                            const isVac = isVacationDay(dateStr);
                                                            return <th key={i} className={`p-4 border-r min-w-[180px] ${isHol ? 'holiday-bg' : isEv ? 'event-bg' : isVac ? 'vacation-bg opacity-30' : ''}`}>
                                                                <div className={`text-[10px] font-bold leading-none ${isHol ? 'holiday-text' : isEv ? 'event-text' : 'text-slate-400'}`}>{dateStr.split('-').slice(1).join('.')}</div>
                                                                <div className={`font-black text-sm mt-1 leading-none ${isHol ? 'holiday-text' : isEv ? 'event-text' : 'text-slate-700'}`}>{d}요일</div>
                                                            </th>;
                                                        });
                                                    })()}

                                                                    </div>

                                                            </div>

                                                        {stats[cls][sem].history.length > 0 && (

                                    if (targetCellInfo.isHoliday || targetCellInfo.isEvent || targetCellInfo.isVacation) {
                                        return { msg: '학교 일정/방학 기간입니다. (입력 시 주의)', severity: 'warning' };
                                    }
                                    
                                    // 2. 교사 중복 체크 (타 학급/타 학년 포함 전수 조사)
                                    if (targetType !== 'external') {
                                        // A. 마스터 시간표(baseSchedule) 전수 대조
                                        const masterConflict = Object.values(baseSchedule).find(v => 
                                            v.dayIdx === dayIdx && v.period === targetPeriod && String(v.type) === String(targetType) && v.classLabel !== cls

                                            return { msg: `${SPECIALISTS.find(s=>s.id===targetType)?.name} 선생님은 마스터 시간표상 해당 시간에 [${masterConflict.classLabel}] 수업 중입니다.`, severity: 'conflict' };
                                        }

                                        // B. 수동 등록된(override) 일정 정밀 확인 (날짜 하이픈 고려 파싱)
                                        const overrideConflictKey = Object.keys(overrides).find(key => {
                                            const kParts = key.split('-');
                                            const kDate = `${kParts[0]}-${kParts[1]}-${kParts[2]}`;
                                            const kPeriod = parseInt(kParts[3]);
                                            const kClass = kParts.slice(4).join('-');
                                            const v = overrides[key];
                                            
                                            // 1) 날짜/교시 일치, 2) 과목 일치, 3) 현재 편집중인 반이 아님, 4) 실제로 타입이 있는 유효한 수업임
                                            return kDate === targetDate && kPeriod === targetPeriod && String(v.type) === String(targetType) && kClass !== cls && !v.hideBase && v.type;
                                        });

                                            const confClass = overrideConflictKey.split('-').slice(4).join('-');

                                                                        {PERIODS.map(n => <option key={n} value={n}>{n}교시</option>)}
                                                                    </select>
                                                                </div>
                                                            </div>
                                                            {conflict && (
                                                                <div className={`flex items-center gap-2 p-4 rounded-2xl border animate-in ${conflict.severity === 'conflict' ? 'bg-rose-50 border-rose-100 text-rose-600' : 'bg-amber-50 border-amber-100 text-amber-700'}`}>
                                                                    <SafeIcon name="AlertCircle" size={16}/><span className="text-[11px] font-black leading-tight">{conflict.msg}</span>
                                                                </div>

                                                                        const newItem = { title: currentItem.title || "", type: currentItem.type, status: 'held', classLabel: cls };

                                                                    <button onClick={async () => {

                                                                        {conflict ? '경고 무시하고 강제 반영' : '달력에 반영'}

                                                                    </select>
                                                                    {conflict && (
                                                                        <div className={`flex items-center gap-2 p-4 rounded-2xl border animate-in ${conflict.severity === 'conflict' ? 'bg-rose-50 border-rose-100 text-rose-600' : 'bg-amber-50 border-amber-100 text-amber-700'}`}>
                                                                            <SafeIcon name="AlertCircle" size={16}/><span className="text-[11px] font-black leading-tight">{conflict.msg}</span>
                                                                        </div>
                                                                    )}
                                                                    <button disabled={!newRegTitle} onClick={async () => {
                                                                        if(!newRegTitle) return;
                                                                        const existing = overrides[selectedCell] || {};
                                                                        await saveData('overrides', selectedCell, { ...existing, title: newRegTitle, type: 'external', status: 'held', classLabel: cls });
                                                                        setIsSidebarOpen(false);
                                                                    }} className={`w-full py-5 rounded-[1.8rem] font-black text-[14px] shadow-xl transition-all ${!newRegTitle ? 'bg-slate-100 text-slate-300' : (conflict ? 'bg-amber-500 hover:bg-amber-600 text-white shadow-amber-200' : 'bg-slate-900 text-white hover:bg-black active:scale-95')}`}>
                                                                        {conflict ? '경고 무시하고 강제 반영' : '달력에 반영'}
                                                                    </button>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="p-8 border-t bg-slate-50/50 space-y-3">
                                            {currentItem && (
                                                <button onClick={async () => {
                                                    if(confirm("일정 삭제 (기존 전담은 복구됨)")) {
                                                        const existing = overrides[selectedCell] || {};
                                                        if (activeMoveItem === 'base') await saveData('overrides', selectedCell, { ...existing, hideBase: true });
                                                        else {
                                                            const { type, title, status, ...rest } = existing;
                                                            if (Object.keys(rest).length === 0) await deleteData('overrides', selectedCell);
                                                            else await saveData('overrides', selectedCell, rest);
                                                        }
                                                        setIsSidebarOpen(false);
                                                    }
                                                }} className="w-full py-4 bg-white text-rose-500 font-black rounded-2xl border border-rose-100 text-[12px] uppercase tracking-widest">삭제</button>
                                            )}
                                            <button onClick={() => { setIsSidebarOpen(false); setMoveDate(""); setMovePeriod(null); setActiveMoveItem(null); setNewRegTitle(''); }} className="w-full py-4 bg-slate-200 text-slate-500 font-black rounded-2xl text-[12px] uppercase tracking-widest">닫기</button>
                                        </div>
                                    </>
                                );
                            })()}
                        </div>
                    )}

                    <div className="fixed bottom-6 left-6 flex items-center gap-3 bg-slate-900 text-white px-5 py-3 rounded-full shadow-2xl z-[110] border border-white/10 opacity-90 scale-90">
                        <div className="w-2.5 h-2.5 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_15px_rgba(52,211,153,1)]"></div>
                        <span className="text-[10px] font-black tracking-widest uppercase italic leading-none">Matrix V8.11 Precision Engine Ready</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
