<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전담마크 Pro V9.0: 통합 스마트 센터</title>
    
    <!-- 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; background-color: #F8FAFC; color: #1e293b; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        .emerald-gradient { background: linear-gradient(135deg, #10B981 0%, #059669 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. Firebase 설정 ---
        const syncFirebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSy...", 
            authDomain: "jdmk-v2.firebaseapp.com",
            projectId: "jdmk-v2",
            storageBucket: "jdmk-v2.firebasestorage.app",
            messagingSenderId: "279087439497",
            appId: "1:279087439497:web:e7f19f6a911483248cb058"
        };
        const specialistFirebaseConfig = {
            apiKey: "AIzaSyBWxSDDYkOtaZI9dByQ85A0izlrCmHEoIQ",
            authDomain: "jdmk-v2.firebaseapp.com",
            projectId: "jdmk-v2",
            storageBucket: "jdmk-v2.firebasestorage.app",
            messagingSenderId: "279087439497",
            appId: "1:279087439497:web:e7f19f6a911483248cb058"
        };
        const syncAppId = typeof __app_id !== 'undefined' ? __app_id : 'grade-pro-sync-v4';
        const specAppId = 'jdmk-v5-final';
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        // Firebase 초기화
        const syncApp = !firebase.apps.length ? firebase.initializeApp(syncFirebaseConfig) : firebase.app();
        const specApp = !firebase.apps.find(a => a.name === "specialist") 
            ? firebase.initializeApp(specialistFirebaseConfig, "specialist") 
            : firebase.app("specialist");

        const syncDb = syncApp.firestore();
        const syncAuth = syncApp.auth();
        const specDb = specApp.firestore();
        const specAuth = specApp.auth();

        const { useState, useEffect, useMemo, useRef } = React;

        // --- 공통 컴포넌트: 아이콘 로더 ---
        const LucideIcon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const getKstTodayStr = () => new Intl.DateTimeFormat('sv-SE', { timeZone: 'Asia/Seoul' }).format(new Date());

        const SPECIALISTS = [
            { id: 'english', name: '영어', color: 'bg-indigo-600', text: 'text-indigo-700', bg: 'bg-indigo-50', border: 'border-indigo-200' },
            { id: 'science', name: '과학', color: 'bg-emerald-600', text: 'text-emerald-700', bg: 'bg-emerald-50', border: 'border-emerald-200' },
            { id: 'pe', name: '체육', color: 'bg-rose-600', text: 'text-rose-700', bg: 'bg-rose-50', border: 'border-rose-200' },
            { id: 'external', name: '외부강사', color: 'bg-amber-600', text: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' }
        ];

        const HOLIDAYS_2026 = {
            '2026-01-01': '신정', '2026-03-01': '삼일절', '2026-05-05': '어린이날', '2026-06-06': '현충일', '2026-08-15': '광복절', '2026-10-03': '개천절', '2026-10-09': '한글날', '2026-12-25': '성탄절'
        };

        // --- 메인 App 컴포넌트 ---
        function App() {
            const [mainTab, setMainTab] = useState('sync');
            const [user, setUser] = useState(null);

            useEffect(() => {
                const init = async () => {
                    try {
                        if (initialAuthToken) {
                            try { await syncAuth.signInWithCustomToken(initialAuthToken); }
                            catch (e) { await syncAuth.signInAnonymously(); }
                        } else {
                            await syncAuth.signInAnonymously();
                        }
                        await specAuth.signInAnonymously();
                    } catch (e) { console.error("Auth Error", e); }
                };
                init();
                const unsub = syncAuth.onAuthStateChanged(setUser);
                return () => unsub();
            }, []);

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b border-slate-100 px-6 py-4 sticky top-0 z-[100] shadow-sm flex flex-col md:flex-row items-center justify-between gap-4">
                        <div className="flex items-center space-x-3 w-full md:w-auto">
                            <div className="bg-[#10B981] p-2 rounded-xl text-white shadow-lg">
                                <LucideIcon name="layout" size={24} />
                            </div>
                            <div className="text-left">
                                <div className="flex items-center gap-1.5">
                                    <h1 className="text-xl font-black text-slate-800 tracking-tight">Grade-Sync</h1>
                                    <span className="text-xl font-black text-[#10B981]">Smart</span>
                                </div>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Unified Collaboration Hub</p>
                            </div>
                        </div>

                        <nav className="flex bg-slate-100 p-1 rounded-2xl w-full md:w-auto">
                            <button 
                                onClick={() => setMainTab('sync')} 
                                className={`px-6 py-2.5 rounded-xl text-xs font-black transition-all ${mainTab === 'sync' ? 'bg-white text-[#10B981] shadow-md' : 'text-slate-500 hover:text-slate-800'}`}
                            >
                                <LucideIcon name="message-square" size={14} className="mr-2" /> 협업 센터
                            </button>
                            <button 
                                onClick={() => setMainTab('spec')} 
                                className={`px-6 py-2.5 rounded-xl text-xs font-black transition-all ${mainTab === 'spec' ? 'bg-white text-[#10B981] shadow-md' : 'text-slate-500 hover:text-slate-800'}`}
                            >
                                <LucideIcon name="calendar" size={14} className="mr-2" /> 시수 관리
                            </button>
                        </nav>

                        <div className="hidden lg:flex items-center space-x-4 border-l pl-6 border-slate-100">
                             <div className="text-right">
                                <p className="text-xs font-black text-slate-800 uppercase">{new Intl.DateTimeFormat('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' }).format(new Date())}</p>
                                <p className="text-[10px] text-[#10B981] font-black uppercase tracking-tighter">System Engine Active</p>
                             </div>
                             <div className="w-10 h-10 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center font-black text-slate-400 text-[10px] shadow-inner">
                                {user?.uid?.substring(0, 2).toUpperCase() || 'U'}
                             </div>
                        </div>
                    </header>

                    <main className="flex-1 animate-in">
                        {mainTab === 'sync' ? <GradeSyncModule user={user} /> : <SpecialistModule user={user} />}
                    </main>
                </div>
            );
        }

        // --- 4. GradeSync Module (협업 센터) ---
        function GradeSyncModule({ user }) {
            const [tasks, setTasks] = useState([]);
            const [newTaskTitle, setNewTaskTitle] = useState('');
            const [newTaskContent, setNewTaskContent] = useState('');
            const [newDeadlineRaw, setNewDeadlineRaw] = useState('');
            const [selectedDate, setSelectedDate] = useState(getKstTodayStr());
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [showCommentModal, setShowCommentModal] = useState(null);
            const [commentText, setCommentText] = useState('');
            
            const classList = ['1반', '2반', '3반', '4반'];

            useEffect(() => {
                if (!user) return;
                const path = syncDb.collection('artifacts').doc(syncAppId).collection('public').doc('data').collection('gradeTasks');
                const unsub = path.onSnapshot(snap => {
                    setTasks(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.createdAt - a.createdAt));
                });
                return () => unsub();
            }, [user]);

            const addTask = async (e) => {
                e.preventDefault();
                if (!newTaskTitle.trim()) return;
                let deadline = newDeadlineRaw.length === 8 ? `${newDeadlineRaw.substring(0,4)}-${newDeadlineRaw.substring(4,6)}-${newDeadlineRaw.substring(6,8)}` : getKstTodayStr();
                const checks = {}; classList.forEach(c => checks[c] = false);
                await syncDb.collection('artifacts').doc(syncAppId).collection('public').doc('data').collection('gradeTasks').add({
                    title: newTaskTitle, content: newTaskContent, deadline, checks, comments: [], createdAt: Date.now(), createdBy: user.uid
                });
                setNewTaskTitle(''); setNewTaskContent(''); setNewDeadlineRaw('');
            };

            const addComment = async (taskId) => {
                if (!commentText.trim()) return;
                const taskRef = syncDb.collection('artifacts').doc(syncAppId).collection('public').doc('data').collection('gradeTasks').doc(taskId);
                const task = tasks.find(t => t.id === taskId);
                await taskRef.update({
                    comments: [...(task.comments || []), { text: commentText, userId: user.uid, createdAt: Date.now() }]
                });
                setCommentText('');
            };

            const activeTasks = tasks.filter(t => !Object.values(t.checks || {}).every(v => v === true));
            const completedTasks = tasks.filter(t => Object.values(t.checks || {}).every(v => v === true));
            const sidebarTasks = tasks.filter(t => t.deadline === selectedDate);
            const currentTaskForComment = tasks.find(t => t.id === showCommentModal);

            return (
                <div className="max-w-[1600px] mx-auto p-4 lg:p-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
                    <div className="lg:col-span-8 space-y-10">
                        {/* 신규 업무 등록 */}
                        <section className="bg-white rounded-[40px] shadow-sm border border-slate-100 p-10 text-left">
                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center">
                                <LucideIcon name="plus" size={14} className="mr-2" /> 신규 업무 등록
                            </h3>
                            <form onSubmit={addTask} className="flex flex-col md:flex-row gap-4">
                                <div className="flex-[3] space-y-4">
                                    <input type="text" value={newTaskTitle} onChange={e => setNewTaskTitle(e.target.value)} placeholder="제목을 입력하세요..." className="w-full px-7 py-5 rounded-[24px] bg-slate-50 border-none font-black text-lg outline-none focus:ring-2 focus:ring-[#10B981]" />
                                    <textarea value={newTaskContent} onChange={e => setNewTaskContent(e.target.value)} placeholder="상세 내용을 입력하세요 (선택)" rows="1" className="w-full px-7 py-3 rounded-[24px] bg-slate-50 border-none font-bold text-sm text-slate-500 outline-none resize-none"></textarea>
                                </div>
                                <div className="flex-1 flex flex-col gap-4">
                                    <input type="text" value={newDeadlineRaw} onChange={e => setNewDeadlineRaw(e.target.value.replace(/\D/g,''))} placeholder="20260410" maxLength={8} className="w-full px-4 py-5 rounded-[24px] bg-slate-50 text-center font-black outline-none focus:ring-2 focus:ring-[#10B981]" />
                                    <button type="submit" className="bg-[#10B981] text-white px-10 py-5 rounded-[24px] font-black shadow-xl shadow-emerald-100 transition-all hover:scale-[1.02] active:scale-[0.98]">업무 등록</button>
                                </div>
                            </form>
                        </section>

                        {/* 진행 중인 업무 */}
                        <div className="space-y-6 text-left">
                            <div className="flex items-center gap-2 px-2">
                                <div className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest">진행 중인 업무 ({activeTasks.length})</h2>
                            </div>
                            <div className="grid grid-cols-1 gap-6">
                                {activeTasks.map(t => <GradeTaskCard key={t.id} task={t} classList={classList} onComment={() => setShowCommentModal(t.id)} />)}
                            </div>
                        </div>

                        {/* 완료된 업무 */}
                        {completedTasks.length > 0 && (
                            <div className="space-y-6 pt-10 border-t border-slate-100 text-left">
                                <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest px-2">최근 완료됨 ({completedTasks.length})</h2>
                                <div className="grid grid-cols-1 gap-6">
                                    {completedTasks.map(t => <GradeTaskCard key={t.id} task={t} classList={classList} isDone />)}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 우측 사이드바 */}
                    <div className="lg:col-span-4 space-y-8">
                        <section className="bg-white rounded-[40px] shadow-sm border border-slate-100 overflow-hidden sticky top-32">
                            <div className="p-8 border-b border-slate-50 flex items-center justify-between">
                                <h3 className="font-black text-slate-800 flex items-center gap-2 text-base italic uppercase">
                                    <LucideIcon name="calendar" size={18} className="text-[#10B981]" />
                                    {currentMonth.getFullYear()}. {currentMonth.getMonth()+1}
                                </h3>
                                <div className="flex gap-1">
                                    <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth()-1, 1))} className="p-2 hover:bg-slate-50 rounded-xl transition-colors"><LucideIcon name="chevron-left" size={20} /></button>
                                    <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth()+1, 1))} className="p-2 hover:bg-slate-50 rounded-xl transition-colors"><LucideIcon name="chevron-right" size={20} /></button>
                                </div>
                            </div>
                            <div className="grid grid-cols-7 p-6 gap-1">
                                {['SUN','MON','TUE','WED','THU','FRI','SAT'].map((d, i) => <div key={d} className={`text-[9px] font-black ${i===0?'text-rose-400':i===6?'text-blue-400':'text-slate-300'} text-center py-2`}>{d}</div>)}
                                {[...Array(new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1).getDay())].map((_, i) => <div key={`empty-${i}`} />)}
                                {[...Array(new Date(currentMonth.getFullYear(), currentMonth.getMonth()+1, 0).getDate())].map((_, i) => {
                                    const d = i + 1;
                                    const ds = `${currentMonth.getFullYear()}-${String(currentMonth.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                                    const isToday = ds === getKstTodayStr();
                                    const hasTask = tasks.some(t => t.deadline === ds);
                                    return (
                                        <button 
                                            key={d} 
                                            onClick={() => setSelectedDate(ds)}
                                            className={`h-12 flex flex-col items-center justify-center rounded-2xl relative transition-all ${selectedDate === ds ? 'bg-slate-900 text-white shadow-xl scale-110' : isToday ? 'bg-emerald-50 text-[#10B981]' : 'hover:bg-slate-50 text-slate-600'}`}
                                        >
                                            <span className="text-sm font-black">{d}</span>
                                            {hasTask && <div className={`w-1.5 h-1.5 rounded-full absolute bottom-2 ${selectedDate === ds ? 'bg-emerald-400' : 'bg-slate-300'}`} />}
                                        </button>
                                    );
                                })}
                            </div>

                            <div className="p-8 bg-slate-50/50 border-t border-slate-100 text-left">
                                <h4 className="text-[10px] font-black text-[#10B981] uppercase tracking-widest mb-6 flex items-center">
                                    <LucideIcon name="clipboard-check" size={14} className="mr-2" /> {selectedDate} 업무 요약
                                </h4>
                                <div className="space-y-3">
                                    {sidebarTasks.length === 0 ? <p className="text-xs text-slate-400 font-bold py-6 text-center italic">등록된 업무가 없습니다.</p> :
                                    sidebarTasks.map(t => {
                                        const isAllDone = Object.values(t.checks||{}).every(v=>v);
                                        return (
                                            <div key={t.id} className="flex items-center justify-between p-4 bg-white rounded-2xl border border-slate-100 shadow-sm hover:border-emerald-200 transition-colors">
                                                <span className="text-xs font-black truncate max-w-[180px] text-slate-700">{t.title}</span>
                                                <div className={`w-2.5 h-2.5 rounded-full ${isAllDone ? 'bg-[#10B981]' : 'bg-slate-200'}`} />
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </section>
                    </div>

                    {/* 댓글 모달 */}
                    {showCommentModal && currentTaskForComment && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-lg rounded-[48px] shadow-2xl flex flex-col max-h-[85vh] overflow-hidden text-left">
                                <div className="p-10 border-b border-slate-50 flex justify-between items-center">
                                    <div>
                                        <h3 className="text-2xl font-black text-slate-800 tracking-tight">의견 공유</h3>
                                        <p className="text-[10px] font-bold text-slate-400 mt-1 uppercase truncate max-w-[280px]">{currentTaskForComment.title}</p>
                                    </div>
                                    <button onClick={() => setShowCommentModal(null)} className="p-3 hover:bg-slate-50 rounded-full transition-colors"><LucideIcon name="x" size={28} className="text-slate-300" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-10 space-y-6">
                                    {(!currentTaskForComment.comments || currentTaskForComment.comments.length === 0) ? 
                                        <div className="text-center py-16 text-slate-300 text-sm font-black italic uppercase">Matrix Feed Empty</div> :
                                        currentTaskForComment.comments.map((c, i) => (
                                            <div key={i} className={`flex flex-col ${c.userId === user.uid ? 'items-end' : 'items-start'}`}>
                                                <div className={`max-w-[85%] p-5 rounded-[28px] text-sm font-bold leading-relaxed ${c.userId === user.uid ? 'bg-emerald-600 text-white rounded-tr-none shadow-lg shadow-emerald-100' : 'bg-slate-100 text-slate-700 rounded-tl-none'}`}>
                                                    {c.text}
                                                </div>
                                                <span className="text-[9px] text-slate-400 mt-2 font-black uppercase tracking-tighter">{c.userId.substring(0, 6)} • {new Date(c.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                            </div>
                                        ))
                                    }
                                </div>
                                <div className="p-10 border-t border-slate-50 bg-slate-50/30">
                                    <div className="flex gap-3">
                                        <input type="text" value={commentText} onChange={e => setCommentText(e.target.value)} onKeyPress={e => e.key === 'Enter' && addComment(showCommentModal)} placeholder="여기에 의견을 남기세요..." className="flex-1 bg-white border-none rounded-[24px] px-7 py-4 text-sm font-bold outline-none shadow-sm focus:ring-2 focus:ring-emerald-500" />
                                        <button onClick={() => addComment(showCommentModal)} className="bg-emerald-600 text-white p-4 rounded-full shadow-xl hover:scale-105 active:scale-90 transition-all"><LucideIcon name="send" size={20} /></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- Task Card Component ---
        function GradeTaskCard({ task, classList, onComment, isDone }) {
            const toggle = async (cls) => {
                const updated = { ...task.checks, [cls]: !task.checks[cls] };
                await syncDb.collection('artifacts').doc(syncAppId).collection('public').doc('data').collection('gradeTasks').doc(task.id).update({ checks: updated });
            };
            const doneCount = Object.values(task.checks || {}).filter(v => v === true).length;
            const progress = (doneCount / classList.length) * 100;

            return (
                <div className={`bg-white rounded-[44px] border-2 transition-all group overflow-hidden ${isDone ? 'opacity-40 border-slate-100 scale-[0.98]' : 'border-white shadow-sm hover:shadow-2xl hover:-translate-y-1'}`}>
                    <div className="p-10 lg:p-12">
                        <div className="flex justify-between items-start mb-8">
                            <div>
                                <div className="flex items-center gap-3 mb-5">
                                    <span className="px-4 py-1.5 rounded-full bg-emerald-500 text-white text-[9px] font-black uppercase tracking-widest shadow-xl shadow-emerald-100">D-Day</span>
                                    <span className="text-xs text-slate-400 font-black uppercase tracking-tighter">{task.deadline.replace(/-/g, '. ')}</span>
                                </div>
                                <h3 className={`text-2xl font-black tracking-tight ${isDone ? 'line-through text-slate-300' : 'text-slate-800'}`}>{task.title}</h3>
                                {task.content && <p className="mt-3 text-sm font-bold text-slate-400 leading-relaxed line-clamp-2">{task.content}</p>}
                            </div>
                            <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onClick={() => syncDb.collection('artifacts').doc(syncAppId).collection('public').doc('data').collection('gradeTasks').doc(task.id).delete()} className="text-rose-400 p-4 hover:bg-rose-50 rounded-full transition-colors"><LucideIcon name="trash-2" size={20}/></button>
                            </div>
                        </div>
                        
                        <div className="flex flex-col md:flex-row justify-between items-center gap-8 border-t border-slate-50 pt-10">
                            <div className="flex flex-wrap gap-3">
                                {classList.map(cls => (
                                    <button 
                                        key={cls} 
                                        onClick={() => toggle(cls)} 
                                        className={`px-7 py-4 rounded-[26px] border-2 font-black text-sm flex items-center gap-2 transition-all ${task.checks[cls] ? 'bg-[#10B981] border-[#10B981] text-white shadow-2xl shadow-emerald-100 scale-105' : 'bg-white border-slate-100 text-slate-300 hover:border-emerald-200'}`}
                                    >
                                        {cls} {task.checks[cls] && <LucideIcon name="check-circle-2" size={16}/>}
                                    </button>
                                ))}
                            </div>
                            <div className="flex items-center gap-10">
                                <div className="flex flex-col items-end">
                                    <span className="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-3 italic">Sync Status: {doneCount}/{classList.length}</span>
                                    <div className="w-40 h-2 bg-slate-50 rounded-full overflow-hidden shadow-inner">
                                        <div className="h-full bg-[#10B981] transition-all duration-700 ease-out" style={{width: `${progress}%`}}></div>
                                    </div>
                                </div>
                                {!isDone && onComment && (
                                    <button onClick={onComment} className="p-4 text-slate-300 hover:text-emerald-500 hover:scale-110 transition-all bg-slate-50 rounded-3xl">
                                        <LucideIcon name="message-square" size={22} />
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 5. Specialist Module (시수 관리) ---
        function SpecialistModule({ user }) {
            const [isLoading, setIsLoading] = useState(true);
            const [baseSchedule, setBaseSchedule] = useState({});
            const [overrides, setOverrides] = useState({});
            const [targetHours, setTargetHours] = useState({ s1: { english: 15, science: 15, pe: 15 }, s2: { english: 15, science: 15, pe: 15 } });
            const [semesterConfig, setSemesterConfig] = useState({ s1Start: '2026-03-02', s1End: '2026-07-17', s2Start: '2026-08-24', s2End: '2026-12-30' });
            const [academicEvents, setAcademicEvents] = useState({});
            const [activeTab, setActiveTab] = useState('academic');
            const [selectedDate, setSelectedDate] = useState(getKstTodayStr());
            const [instTitle, setInstTitle] = useState("");
            const [instDates, setInstDates] = useState("");
            const [instClass, setInstClass] = useState("5-1");
            const [instStart, setInstStart] = useState(1);
            const [instEnd, setInstEnd] = useState(1);

            useEffect(() => {
                if (!user) return;
                
                let loadedCount = 0;
                const totalCollections = 3;
                const markLoaded = () => {
                    loadedCount++;
                    if (loadedCount >= totalCollections) setIsLoading(false);
                };

                const path = (c) => specDb.collection('artifacts').doc(specAppId).collection('public').doc('data').collection(c);
                
                const unsubs = [
                    path('base').onSnapshot(s => { 
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data()); 
                        setBaseSchedule(d); markLoaded(); 
                    }, err => { console.error(err); markLoaded(); }),
                    path('overrides').onSnapshot(s => { 
                        const d = {}; s.docs.forEach(doc => d[doc.id] = doc.data()); 
                        setOverrides(d); markLoaded(); 
                    }, err => { console.error(err); markLoaded(); }),
                    path('academic').onSnapshot(s => {
                        const d = {};
                        s.docs.forEach(doc => {
                            if (doc.id === 'targets') setTargetHours(doc.data());
                            else if (doc.id === 'semesters') setSemesterConfig(doc.data());
                            else d[doc.id] = doc.data();
                        });
                        setAcademicEvents(d); markLoaded();
                    }, err => { console.error(err); markLoaded(); })
                ];
                
                // 데이터 엔진 지연 시 강제 해제 (최대 4초)
                const timer = setTimeout(() => setIsLoading(false), 4000);

                return () => {
                    unsubs.forEach(u => u());
                    clearTimeout(timer);
                };
            }, [user]);

            const saveData = async (coll, id, data) => {
                await specDb.collection('artifacts').doc(specAppId).collection('public').doc('data').collection(coll).doc(id).set({ ...data, updatedAt: Date.now() });
            };

            const getCellData = (dateStr, period, classLabel) => {
                const overrideKey = `${dateStr}-${period}-${classLabel}`;
                const date = new Date(dateStr + 'T00:00:00');
                const dayIdx = (date.getDay() + 6) % 7;
                if (HOLIDAYS_2026[dateStr]) return { type: 'holiday', title: HOLIDAYS_2026[dateStr], isHoliday: true };
                const academic = academicEvents[dateStr];
                if (academic?.isHoliday) return { type: 'holiday', title: academic.title, isHoliday: true };
                if (academic?.isEvent) return { type: 'event', title: academic.title, isEvent: true };

                const override = overrides[overrideKey];
                const baseMatchEntry = Object.entries(baseSchedule).find(([k,v]) => v.dayIdx === dayIdx && v.period === period && v.classLabel === classLabel);
                const baseMatch = baseMatchEntry ? { id: baseMatchEntry[0], ...baseMatchEntry[1] } : null;
                return { override: override?.type ? override : null, base: (baseMatch && !override?.hideBase) ? baseMatch : null };
            };

            const dynamicClasses = useMemo(() => {
                const classSet = new Set(['5-1', '5-2', '5-3', '5-4']);
                Object.values(baseSchedule).forEach(v => { if(v.classLabel) classSet.add(v.classLabel); });
                return Array.from(classSet).sort();
            }, [baseSchedule]);

            const stats = useMemo(() => {
                const res = {}; dynamicClasses.forEach(c => { res[c] = { s1: { english: 0, science: 0, pe: 0, external: 0 }, s2: { english: 0, science: 0, pe: 0, external: 0 } }; });
                const count = (start, end, sem) => {
                    let curr = new Date(start + 'T00:00:00'); const stop = new Date(end + 'T00:00:00');
                    while (curr <= stop) {
                        const dStr = curr.toISOString().split('T')[0];
                        if (!HOLIDAYS_2026[dStr] && !academicEvents[dStr]?.isHoliday && (curr.getDay()+6)%7 < 5) {
                            dynamicClasses.forEach(cls => {
                                [1,2,3,4,5,6].forEach(p => {
                                    const data = getCellData(dStr, p, cls);
                                    if (data.override) res[cls][sem][data.override.type]++;
                                    if (data.base) res[cls][sem][data.base.type]++;
                                });
                            });
                        }
                        curr.setDate(curr.getDate() + 1);
                    }
                };
                count(semesterConfig.s1Start, semesterConfig.s1End, 's1');
                count(semesterConfig.s2Start, semesterConfig.s2End, 's2');
                return res;
            }, [overrides, baseSchedule, academicEvents, dynamicClasses, semesterConfig]);

            if (isLoading) return (
                <div className="flex flex-col items-center justify-center min-h-[60vh] space-y-4">
                    <div className="w-12 h-12 border-4 border-[#10B981] border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-sm font-black text-[#10B981] animate-pulse">Matrix Specialist Loading...</p>
                </div>
            );

            return (
                <div className="p-4 lg:p-10 space-y-8 text-left max-w-[1600px] mx-auto animate-in">
                    <nav className="flex justify-center bg-white p-2 rounded-3xl shadow-sm border border-slate-100 max-w-fit mx-auto">
                        {[{ id: 'academic', label: '수업 현황' }, { id: 'instructor', label: '강사 관리' }, { id: 'stats', label: '시수 통계' }].map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-8 py-3 rounded-2xl text-xs font-black transition-all ${activeTab === tab.id ? 'bg-[#10B981] text-white shadow-lg' : 'text-slate-500 hover:text-[#10B981]'}`}>
                                {tab.label}
                            </button>
                        ))}
                    </nav>

                    {activeTab === 'academic' && (
                        <div className="space-y-6">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-6 bg-white p-8 rounded-[40px] shadow-sm border border-slate-50">
                                <div className="flex items-center gap-2">
                                    <button onClick={() => { let d = new Date(selectedDate + 'T00:00:00'); d.setDate(d.getDate()-1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-3 border rounded-2xl hover:bg-slate-50 transition-colors"><LucideIcon name="chevron-left" size={24}/></button>
                                    <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="px-6 py-3 bg-slate-50 rounded-2xl font-black text-slate-700 outline-none border-none text-sm" />
                                    <button onClick={() => { let d = new Date(selectedDate + 'T00:00:00'); d.setDate(d.getDate()+1); setSelectedDate(d.toISOString().split('T')[0]); }} className="p-3 border rounded-2xl hover:bg-slate-50 transition-colors"><LucideIcon name="chevron-right" size={24}/></button>
                                </div>
                                <h2 className="text-xl font-black text-slate-800 italic uppercase tracking-tighter">Daily Timetable Matrix</h2>
                                <div className="px-6 py-3 rounded-2xl bg-slate-100 text-slate-400 font-black text-[10px] uppercase">Engine Active</div>
                            </div>
                            <div className="bg-white rounded-[40px] border border-slate-50 shadow-sm overflow-hidden overflow-x-auto">
                                <table className="w-full border-collapse min-w-[800px]">
                                    <thead><tr className="bg-slate-50 border-b">
                                        <th className="p-6 border-r w-24 text-xs font-black text-slate-300 uppercase italic text-center">교시</th>
                                        {dynamicClasses.map(cls => <th key={cls} className="p-6 border-r font-black text-slate-700 text-sm italic text-center uppercase tracking-widest">{cls}</th>)}
                                    </tr></thead>
                                    <tbody>
                                        {[1,2,3,4,5,6].map(p => (
                                            <tr key={p} className="border-b last:border-0">
                                                <td className="p-6 bg-slate-50/50 border-r text-center font-black text-slate-200 text-5xl italic leading-none">{p}</td>
                                                {dynamicClasses.map(cls => {
                                                    const cell = getCellData(selectedDate, p, cls);
                                                    const spec = SPECIALISTS.find(s => s.id === (cell.override?.type || cell.base?.type));
                                                    return (
                                                        <td key={cls} className="p-3 border-r last:border-0 align-middle min-h-[120px] bg-white relative">
                                                            {(cell.override || cell.base) ? (
                                                                <div className={`h-full min-h-[90px] flex flex-col justify-center items-center p-5 rounded-[32px] border shadow-sm transition-all hover:scale-[0.97] ${spec?.bg} ${spec?.text} ${spec?.border}`}>
                                                                    <span className="text-[9px] font-black opacity-30 uppercase tracking-widest mb-1.5">{cell.override ? 'Override' : 'Master'}</span>
                                                                    <span className="text-sm font-black italic text-center leading-tight">{cell.override?.title || spec?.name}</span>
                                                                </div>
                                                            ) : <div className="w-full h-full opacity-0 hover:opacity-10 transition-opacity bg-slate-200 rounded-3xl"></div>}
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {activeTab === 'instructor' && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-in">
                            <div className="lg:col-span-2 bg-amber-600 p-12 rounded-[56px] text-white shadow-2xl">
                                <h3 className="text-3xl font-black mb-8 flex items-center gap-4 italic uppercase tracking-tighter"><LucideIcon name="layers" size={36}/> 강사 수업 일괄 등록</h3>
                                <div className="space-y-8">
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        <input type="text" value={instTitle} onChange={e => setInstTitle(e.target.value)} placeholder="수업명(예: 수영)" className="w-full p-5 rounded-3xl bg-white/10 border-none text-white font-black outline-none placeholder:text-white/40" />
                                        <input type="text" value={instClass} onChange={e => setInstClass(e.target.value)} placeholder="학급(예: 5-1)" className="w-full p-5 rounded-3xl bg-white/10 border-none text-white font-black outline-none placeholder:text-white/40" />
                                        <select value={instStart} onChange={e => setInstStart(parseInt(e.target.value))} className="w-full p-5 rounded-3xl bg-white/20 border-none font-black text-sm outline-none">{[1,2,3,4,5,6].map(p => <option key={p} value={p} className="text-slate-800">{p}교시 시작</option>)}</select>
                                        <select value={instEnd} onChange={e => setInstEnd(parseInt(e.target.value))} className="w-full p-5 rounded-3xl bg-white/20 border-none font-black text-sm outline-none">{[1,2,3,4,5,6].map(p => <option key={p} value={p} className="text-slate-800">{p}교시 종료</option>)}</select>
                                    </div>
                                    <textarea value={instDates} onChange={e => setInstDates(e.target.value)} placeholder="날짜 입력 (예: 4/15, 4/16...)" className="w-full p-8 rounded-[40px] bg-white/10 border-none text-white font-black min-h-[160px] outline-none placeholder:text-white/40" />
                                    <button onClick={async () => {
                                        const parts = instDates.split(/[,|\n\s]+/).map(d => d.trim().replace(/\//g, '.')).filter(d => d);
                                        for(let dStr of parts) {
                                            const [m, day] = dStr.split('.');
                                            const finalD = `2026-${m.padStart(2,'0')}-${day.padStart(2,'0')}`;
                                            for(let i=instStart; i<=instEnd; i++) await saveData('overrides', `${finalD}-${i}-${instClass}`, { title: instTitle, type: 'external', classLabel: instClass });
                                        }
                                        alert("성공적으로 일괄 반영되었습니다.");
                                        setInstDates(""); setInstTitle("");
                                    }} className="w-full py-6 bg-white text-amber-600 font-black rounded-[28px] shadow-2xl transition-all hover:scale-[1.02] active:scale-[0.98] text-lg">데이터 엔진 반영</button>
                                </div>
                            </div>
                            <div className="bg-white p-10 rounded-[56px] border border-slate-100 shadow-sm flex flex-col h-[600px]">
                                <h4 className="font-black text-slate-800 mb-6 uppercase italic text-sm border-l-4 border-amber-500 pl-4">Recently Added Overrides</h4>
                                <div className="flex-1 overflow-y-auto pr-2 space-y-3">
                                    {Object.entries(overrides).filter(([k,v]) => v.type === 'external').slice(-20).map(([k,v]) => (
                                        <div key={k} className="p-5 bg-slate-50 rounded-3xl flex justify-between items-center border border-slate-100">
                                            <div className="text-left"><p className="text-xs font-black text-slate-800">{v.title} ({v.classLabel})</p><p className="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-tighter">{k}</p></div>
                                            <button onClick={async () => await specDb.collection('artifacts').doc(specAppId).collection('public').doc('data').collection('overrides').doc(k).delete()} className="text-rose-400 p-2 hover:bg-white rounded-xl transition-colors"><LucideIcon name="trash-2" size={16}/></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'stats' && (
                        <div className="space-y-12 animate-in">
                            {dynamicClasses.map(cls => (
                                <div key={cls} className="bg-white p-12 rounded-[56px] border border-slate-100 shadow-sm overflow-hidden group">
                                    <h3 className="text-3xl font-black text-slate-800 italic mb-10 uppercase border-b border-slate-50 pb-6 tracking-tighter">Class {cls} Statistics</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-16">
                                        {['s1', 's2'].map(sem => (
                                            <div key={sem} className="bg-slate-50/50 p-10 rounded-[44px] space-y-8 border border-slate-100 shadow-inner">
                                                <h4 className="font-black text-[#10B981] italic uppercase text-xs tracking-widest">{sem === 's1' ? 'First' : 'Second'} Semester Progress</h4>
                                                <div className="space-y-6">
                                                    {SPECIALISTS.filter(s => s.id !== 'external').map(spec => {
                                                        const count = stats[cls][sem][spec.id];
                                                        const target = targetHours[sem]?.[spec.id] || 1;
                                                        const per = Math.min((count/target)*100, 100);
                                                        return (
                                                            <div key={spec.id} className="space-y-3">
                                                                <div className="flex justify-between text-[11px] font-black"><span className="text-slate-400 uppercase">{spec.name}</span><span className="text-slate-900">{count} / {target}</span></div>
                                                                <div className="h-3 bg-white rounded-full overflow-hidden border border-slate-100 shadow-inner">
                                                                    <div className={`h-full ${spec.color} transition-all duration-[1.5s] shadow-lg`} style={{ width: `${per}%` }} />
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
